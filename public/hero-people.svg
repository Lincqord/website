<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007f89"/>
      <stop offset="55%" stop-color="#2a9aa3"/>
      <stop offset="100%" stop-color="#ff7f00"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" rx="40" fill="url(#bg)"/>

  <!-- abstract diverse people silhouettes -->
  <g fill="url(#p1)" opacity="0.92">
    <!-- person 1 -->
    <circle cx="150" cy="300" r="48"/>
    <path d="M82 600c0-52 30-92 68-92s68 40 68 92z"/>
    <!-- person 2 -->
    <circle cx="300" cy="250" r="58"/>
    <path d="M218 600c0-62 37-110 82-110s82 48 82 110z"/>
    <!-- person 3 -->
    <circle cx="455" cy="310" r="46"/>
    <path d="M390 600c0-50 29-88 65-88s65 38 65 88z"/>
  </g>

  <!-- decorative connecting rings -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="2" fill="none">
    <circle cx="300" cy="300" r="200"/>
    <circle cx="300" cy="300" r="150"/>
  </g>

  <text x="300" y="565" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#ffffff" fill-opacity="0.75">
    [ Hero visual placeholder ]
  </text>
</svg>
